name: docs-sync

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/check_docs_sync.py"
      - ".github/workflows/docs-sync.yml"
  push:
    paths:
      - "docs/**"
      - "scripts/check_docs_sync.py"
      - ".github/workflows/docs-sync.yml"

jobs:
  check-docs-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check docs sync (PR)
        if: github.event_name == 'pull_request'
        run: |
          python scripts/check_docs_sync.py \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            --head-ref "${{ github.sha }}"

      - name: Check docs sync (push)
        if: github.event_name == 'push'
        run: |
          python scripts/check_docs_sync.py --base-ref "HEAD~1" --head-ref "HEAD"
